name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: daily_dish_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check app/ tests/

      - name: Format check
        run: uv run ruff format --check app/ tests/

      - name: Type check (basedpyright)
        run: uv run basedpyright

      - name: Tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: ci-test-secret-key
        run: uv run pytest --tb=short

      - name: Apply migrations (Postgres)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/daily_dish_test
        run: uv run alembic upgrade head

      - name: Check for model/migration drift
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/daily_dish_test
        run: uv run alembic check

  web:
    name: Web — lint + codegen
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Verify no Cloudinary secret in build output
        run: |
          npm run build 2>&1 | grep -i "CLOUDINARY_API_SECRET" && exit 1 || true
        env:
          NUXT_PUBLIC_API_URL: http://localhost:8000
